<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Tra cứu Hóa đơn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="search-container">
    <div class="header">
        <img src="logo.png" alt="Logo" class="logo">
        <h2>TRA CỨU HÓA ĐƠN</h2>
    </div>

    <div class="search-form">
        <div class="input-group">
            <label>Mã tra cứu <span class="required">*</span></label>
            <input type="text" id="maTraCuu" placeholder="Nhập mã tra cứu hóa đơn">
        </div>

        <div class="input-group">
            <label>Mã xác thực <span class="required">*</span></label>
            <div class="captcha-row">
                <input type="text" id="captchaInput" placeholder="Nhập mã xác thực">
                <div class="captcha-box" id="captchaValue">...</div>
                <button class="btn-refresh" onclick="refreshCaptcha()">🔄</button>
            </div>
        </div>

        <button class="btn-search" onclick="handleSearch()">TRA CỨU</button>
    </div>
    
    <div class="footer">
        <p>Copyright © 2026 SoftDreams. All rights reserved.</p>
    </div>
</div>

<div id="invoiceModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <div id="invoiceContent">
                </div>
        </div>
        <div class="modal-footer">
            <button class="btn-action btn-close" onclick="closeModal()">Đóng cửa sổ</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
